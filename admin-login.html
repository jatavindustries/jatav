<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JATAV Admin Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#f3f7ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.login-box{

width:400px;
max-width:95%;
background:#fff;
padding:35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.15);

}

.logo{

text-align:center;
font-size:34px;
font-weight:bold;
color:#0056d2;
margin-bottom:10px;

}

.subtitle{

text-align:center;
color:#666;
margin-bottom:30px;

}

.input-box{

margin-bottom:18px;

}

.input-box label{

display:block;
margin-bottom:6px;
font-size:14px;
font-weight:bold;
color:#333;

}

.input-box input{

width:100%;
padding:13px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;

}

.input-box input:focus{

border-color:#0056d2;

}

.password-box{

position:relative;

}

.password-box span{

position:absolute;
right:15px;
top:14px;
cursor:pointer;
font-size:14px;
color:#0056d2;

}

button{

width:100%;
padding:14px;
background:#0056d2;
color:white;
font-size:17px;
border:none;
border-radius:8px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#003ea8;

}

#error{

margin-top:15px;
text-align:center;
color:red;
font-size:14px;

}

footer{

margin-top:25px;
text-align:center;
font-size:13px;
color:#777;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
JATAV
</div>

<div class="subtitle">
Admin & Staff Login
</div>

<div class="input-box">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter Email">

</div>

<div class="input-box">

<label>Password</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Enter Password">

<span onclick="showPassword()">
Show
</span>

</div>

</div>

<button onclick="loginUser()">

Login

</button>

<div id="error"></div>

<footer>

© 2026 JATAV

</footer>

<script>

const supabaseUrl="https://dqigwxlroejnmhmhxzdm.supabase.co";

const supabaseKey="sb_publishable_O72-5olasZIGsRiKHqEmdg_SJfUcY7x";

const supabaseClient = supabase.createClient(
supabaseUrl,
supabaseKey
);

function showPassword(){

const p=document.getElementById("password");

if(p.type=="password"){

p.type="text";

}else{

p.type="password";

}

}
async function loginUser(){

document.getElementById("error").innerHTML="";

const email=document.getElementById("email").value.trim();

const password=document.getElementById("password").value.trim();

if(email=="" || password==""){

document.getElementById("error").innerHTML="Please fill all fields.";

return;

}

const { data, error } = await supabaseClient
.from("admin_users")
.select("*")
.eq("email",email)
.eq("password",password)
.single();


  console.log("Data:", data);
console.log("Error:", error);

if(error || !data){

document.getElementById("error").innerHTML="Invalid Email or Password.";

return;

}

localStorage.setItem("adminLogin","true");

localStorage.setItem("adminRole",data.role);

localStorage.setItem("adminEmail",data.email);

window.location.href="dashboard.html";

}

</script>

</div>

</body>

</html>
