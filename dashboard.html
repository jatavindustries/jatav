<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JATAV Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header>

<h1>JATAV Admin Dashboard</h1>

<button id="logoutBtn">

Logout

</button>

</header>

<div class="container">

<div class="cards">

<div class="card">

<h3>Total Applications</h3>

<div class="number" id="totalApps">

0

</div>

</div>

<div class="card">

<h3>Pending</h3>

<div class="number" id="pendingApps">

0

</div>

</div>

<div class="card">

<h3>Approved</h3>

<div class="number" id="approvedApps">

0

</div>

</div>

<div class="card">

<h3>Rejected</h3>

<div class="number" id="rejectedApps">

0

</div>

</div>

</div>

<div class="toolbar">

<input
type="text"
id="searchBox"
placeholder="Search by Name, Mobile, Email">

<button id="refreshBtn">

Refresh

</button>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>Name</th>

<th>Mobile</th>

<th>Email</th>

<th>City</th>

<th>Loan</th>

<th>Amount</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="tableData">

</tbody>

</table>

</div>

</div>

<script src="dashboard.js"></script>

</body>

</html>
